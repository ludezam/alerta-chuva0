<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>🌧️ Alerta Chuva</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

<div class="sun"></div>
<div class="moon"></div>
<div class="stars-layer" id="stars"></div>
<div class="rain-layer" id="rain"></div>

<header class="topo">
  <h1>🌧️ Alerta de Chuva</h1>
  <p class="subtitulo">Previsão inteligente em tempo real</p>
</header>

<section class="resumo-clima">
  <div>📍 <span id="cidadeAtual">Carregando...</span></div>
  <div class="temperatura-principal"><span id="tempAtual">--°</span></div>
  <div id="statusChuva" class="status status-verde"></div>
  <p id="descricaoAtual"></p>

  <div class="dados-resumo">
    <div>🌡️ <strong id="sensacaoAtual"></strong></div>
    <div>💧 <strong id="umidadeAtual"></strong></div>
    <div>🌬️ <strong id="ventoAtual"></strong></div>
  </div>
</section>

<section class="radar">
  <iframe id="mapaRadar"></iframe>
</section>

<section class="controles">
  <input id="cidade" placeholder="Digite uma cidade">
  <button id="btnBuscar">Buscar</button>
  <button id="btnGPS">GPS</button>
  <button id="btnRefresh">Atualizar</button>
</section>

<section>
  <div id="previsao12h"></div>
</section>

</body>
</html>
